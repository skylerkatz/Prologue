<!-- @dsCard group="Colors" viewport="700x150" subtitle="Accent, danger, added/removed/renamed" name="Semantic colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans);font-size:var(--text-base);color:var(--text);background:var(--bg-app)}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.sw{display:flex;flex-direction:column;gap:4px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}.chip{width:84px;height:48px;border-radius:6px;border:1px solid var(--border)}</style></head><body><div class="row"><div class="sw"><div class="chip" style="background:var(--accent)"></div><span>--accent</span></div><div class="sw"><div class="chip" style="background:var(--accent-strong)"></div><span>--accent-strong</span></div><div class="sw"><div class="chip" style="background:var(--danger)"></div><span>--danger</span></div><div class="sw"><div class="chip" style="background:var(--added)"></div><span>--added</span></div><div class="sw"><div class="chip" style="background:var(--removed)"></div><span>--removed</span></div><div class="sw"><div class="chip" style="background:var(--renamed)"></div><span>--renamed</span></div><div class="sw"><div class="chip" style="background:var(--border)"></div><span>--border</span></div></div></body></html>

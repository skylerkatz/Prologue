<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans);font-size:var(--text-base);color:var(--text);background:var(--bg-app)}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.sw{display:flex;flex-direction:column;gap:4px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}.chip{width:84px;height:48px;border-radius:6px;border:1px solid var(--border)}</style></head><body><div class="row" style="gap:20px;font-size:16px"><div class="sw" style="align-items:center"><span style="font-size:20px;color:var(--text)">←</span><span>direction</span></div><div class="sw" style="align-items:center"><span style="font-size:20px;color:var(--text)">▾</span><span>menu</span></div><div class="sw" style="align-items:center"><span style="font-size:20px;color:var(--text)">▸</span><span>collapsed</span></div><div class="sw" style="align-items:center"><span style="font-size:20px;color:var(--text)">↻</span><span>refresh</span></div><div class="sw" style="align-items:center"><span style="font-size:20px;color:var(--text)">×</span><span>remove</span></div><div class="sw" style="align-items:center"><span style="font-size:20px;color:var(--text)">↳</span><span>reply</span></div><div class="sw" style="align-items:center"><span style="font-size:20px;color:var(--text)">⚠</span><span>changed</span></div><div class="sw" style="align-items:center"><span style="font-size:20px;color:var(--text)">+</span><span>add</span></div></div></body></html>

<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans);font-size:var(--text-base);color:var(--text);background:var(--bg-app)}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.sw{display:flex;flex-direction:column;gap:4px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}.chip{width:84px;height:48px;border-radius:6px;border:1px solid var(--border)}</style></head><body><div class="row"><div class="sw"><div class="chip" style="background:var(--bg-app)"></div><span>--bg-app</span></div><div class="sw"><div class="chip" style="background:var(--bg-card)"></div><span>--bg-card</span></div><div class="sw"><div class="chip" style="background:var(--bg-subtle)"></div><span>--bg-subtle</span></div><div class="sw"><div class="chip" style="background:var(--surface-selected)"></div><span>--surface-selected</span></div><div class="sw"><div class="chip" style="background:var(--text-strong)"></div><span>--text-strong</span></div><div class="sw"><div class="chip" style="background:var(--text)"></div><span>--text</span></div><div class="sw"><div class="chip" style="background:var(--text-muted)"></div><span>--text-muted</span></div></div></body></html>

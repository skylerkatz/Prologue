<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans);font-size:var(--text-base);color:var(--text);background:var(--bg-app)}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.sw{display:flex;flex-direction:column;gap:4px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}.chip{width:84px;height:48px;border-radius:6px;border:1px solid var(--border)}</style></head><body><div class="row"><div class="sw"><div class="chip" style="background:var(--teal-950)"></div><span>--teal-950</span></div><div class="sw"><div class="chip" style="background:var(--teal-900)"></div><span>--teal-900</span></div><div class="sw"><div class="chip" style="background:var(--teal-800)"></div><span>--teal-800</span></div><div class="sw"><div class="chip" style="background:var(--orange-600)"></div><span>--orange-600</span></div><div class="sw"><div class="chip" style="background:var(--orange-500)"></div><span>--orange-500</span></div><div class="sw"><div class="chip" style="background:var(--orange-400)"></div><span>--orange-400</span></div><div class="sw"><div class="chip" style="background:var(--orange-100)"></div><span>--orange-100</span></div></div></body></html>

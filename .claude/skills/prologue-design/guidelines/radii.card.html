<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans);font-size:var(--text-base);color:var(--text);background:var(--bg-app)}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.sw{display:flex;flex-direction:column;gap:4px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}.chip{width:84px;height:48px;border-radius:6px;border:1px solid var(--border)}</style></head><body><div class="row"><div class="sw"><div class="chip" style="background:var(--bg-card);border-radius:var(--radius-sm)"></div><span>4 badge</span></div><div class="sw"><div class="chip" style="background:var(--bg-card);border-radius:var(--radius-md)"></div><span>6 button</span></div><div class="sw"><div class="chip" style="background:var(--bg-card);border-radius:var(--radius-lg)"></div><span>8 card</span></div><div class="sw"><div class="chip" style="background:var(--bg-card);border-radius:var(--radius-xl)"></div><span>10 panel</span></div><div class="sw"><div style="width:84px;height:28px;border:1px solid var(--border);background:var(--bg-card);border-radius:999px"></div><span>pill</span></div></div></body></html>

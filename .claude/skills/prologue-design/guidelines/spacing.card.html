<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans);font-size:var(--text-base);color:var(--text);background:var(--bg-app)}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.sw{display:flex;flex-direction:column;gap:4px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}.chip{width:84px;height:48px;border-radius:6px;border:1px solid var(--border)}</style></head><body><div class="row" style="align-items:flex-end"><div class="sw"><div style="width:4px;height:4px;background:var(--orange-400);border-radius:2px"></div><span>4</span></div><div class="sw"><div style="width:8px;height:8px;background:var(--orange-400);border-radius:2px"></div><span>8</span></div><div class="sw"><div style="width:12px;height:12px;background:var(--orange-400);border-radius:2px"></div><span>12</span></div><div class="sw"><div style="width:16px;height:16px;background:var(--orange-400);border-radius:2px"></div><span>16</span></div><div class="sw"><div style="width:20px;height:20px;background:var(--orange-400);border-radius:2px"></div><span>20</span></div><div class="sw"><div style="width:24px;height:24px;background:var(--orange-400);border-radius:2px"></div><span>24</span></div><div class="sw"><div style="width:32px;height:32px;background:var(--orange-400);border-radius:2px"></div><span>32</span></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">--space-1…8</span></div></body></html>

name: Diff Viewer
icon: null
processes:
  Tauri Development:
    command: npm run tauri dev
    working_dir: null
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  Frontend Only:
    command: npm run dev
    auto_start: false
  TypeScript Check:
    command: npx tsc --noEmit --watch
    auto_start: false
